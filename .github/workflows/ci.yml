name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m venv .venv
          make sync-deps

      - name: Run Ruff
        run: make lint

      - name: Run mypy
        run: make typecheck

      - name: Run pytest
        run: make test

      - name: Build package
        if: matrix.python-version == '3.12'
        run: make build
